name: traffic-signal-bench
version: "1.0.0"
description: >
  AI agent environment for urban traffic signal control.
  The agent manages traffic lights at a 2x2 intersection grid,
  optimizing throughput, minimizing wait times, ensuring pedestrian safety,
  and handling real-time incidents like accidents and emergency vehicles.

author: "TrafficSignalBench Team"
tags:
  - openenv
  - traffic
  - control
  - real-world
  - urban-planning

# Environment interface
interface:
  observation_model: models.Observation
  action_model: models.MultiAction
  reward_model: models.Reward
  state_model: models.EnvironmentState

# API endpoints
endpoints:
  reset:
    method: POST
    path: /reset
    request_body:
      task_id: string
      seed: integer
    response: Observation

  step:
    method: POST
    path: /step
    request_body:
      actions: list[Action]
    response:
      observation: Observation
      reward: Reward
      done: boolean
      info: object

  state:
    method: GET
    path: /state
    response: EnvironmentState

# Tasks
tasks:
  - id: easy
    name: "Single Intersection — Steady Traffic"
    difficulty: easy
    max_steps: 120
    description: >
      Control a single intersection with predictable traffic patterns.
      Optimize signal phase timing to minimize average vehicle wait time.

  - id: medium
    name: "2×2 Grid — Coordinated Signals with Pedestrians"
    difficulty: medium
    max_steps: 360
    description: >
      Coordinate four intersections for green wave optimization.
      Handle rush hour pattern shifts and pedestrian crossing constraints.

  - id: hard
    name: "2×2 Grid — Incidents & Emergency Vehicles"
    difficulty: hard
    max_steps: 480
    description: >
      Full grid with mid-episode incidents: lane-blocking accident,
      emergency vehicle requiring preemption, and stadium event causing
      traffic surge. Agent must adapt signal strategy in real-time.

# Grading
grading:
  score_range: [0.0, 1.0]
  grader_module: graders
  deterministic: true

# Infrastructure
infrastructure:
  framework: fastapi
  port: 7860
  dockerfile: Dockerfile
